<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alert Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            critical: { DEFAULT: '#dc2626', light: '#fef2f2', border: '#fecaca' },
            warning:  { DEFAULT: '#d97706', light: '#fffbeb', border: '#fde68a' },
            low:      { DEFAULT: '#2563eb', light: '#eff6ff', border: '#bfdbfe' },
          }
        }
      }
    };
  </script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8f9fa; color: #111; }
    .fade-in { animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .history-slide { animation: slideIn 0.2s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
/*
 * Alert / Signal Impact Dashboard — single-file React app (Babel-standalone).
 *
 * Layout (search the banners below):
 *   1.  Constants & formatting helpers
 *   2.  Sortable / filterable table primitives  (useSortFilter, SortHeader, TableFilter)
 *   3.  URL routing                              (parseHash, buildHash)
 *   4.  Tiny UI atoms                            (Spinner, ErrorBox, SeverityPill, …)
 *   5.  Issues tab                               (SignalCard / List / Detail / Situation)
 *   6.  Impact dashboard                         (ImpactDashboard, KpiTile, top tables)
 *   7.  Customers tab                            (CustomersScreen, drilldown, panel)
 *   8.  Subscriptions tab                        (overview, list, matrix)
 *   9.  App root + tab router
 *
 * Why one file: this is dev tooling. Babel-standalone compiles JSX inline; no
 * bundler. Splitting would mean adopting a build step, which isn't worth it
 * for an internal dashboard. Section banners below act as our "modules".
 */

const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ═════════════════════════════════════════════════════════════════════════════
// 1. Constants & formatting helpers
// ═════════════════════════════════════════════════════════════════════════════

const SEV_META = {
  CRITICAL: { label: 'Critical', color: '#dc2626', bg: '#fef2f2', border: '#fecaca', tone: 'text-red-600' },
  WARNING:  { label: 'Warning',  color: '#d97706', bg: '#fffbeb', border: '#fde68a', tone: 'text-amber-600' },
  LOW:      { label: 'Low',      color: '#2563eb', bg: '#eff6ff', border: '#bfdbfe', tone: 'text-blue-600' },
};

const STATUS_COLORS = {
  FIRING:   'bg-red-100 text-red-700',
  RESOLVED: 'bg-green-100 text-green-700',
  MUTED:    'bg-gray-100 text-gray-600',
};

function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('en-IN', { dateStyle: 'short', timeStyle: 'short' });
}

/**
 * Bucket a Date / ISO string into the start of its local-timezone day or hour.
 * Returns epoch ms, suitable as a sortable map key. Use `fmtBucketLabel` for
 * the human-readable axis tick.
 */
function localBucketStart(iso, granularity) {
  if (!iso) return null;
  const d = iso instanceof Date ? iso : new Date(iso);
  if (Number.isNaN(d.getTime())) return null;
  return granularity === 'hour'
    ? new Date(d.getFullYear(), d.getMonth(), d.getDate(), d.getHours()).getTime()
    : new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
}

/** Compact local-tz axis label for a bucket epoch ("30 Apr" / "30 Apr 14"). */
function fmtBucketLabel(epoch, granularity) {
  const d = new Date(epoch);
  return granularity === 'hour'
    ? d.toLocaleString(undefined, { month: 'short', day: '2-digit', hour: '2-digit', hour12: false })
    : d.toLocaleDateString(undefined, { month: 'short', day: '2-digit' });
}

/** Full local-tz tooltip label for a bucket epoch. */
function fmtBucketTooltip(epoch, granularity) {
  const d = new Date(epoch);
  return granularity === 'hour'
    ? d.toLocaleString(undefined, { weekday: 'short', month: 'short', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false })
    : d.toLocaleDateString(undefined, { weekday: 'short', year: 'numeric', month: 'short', day: '2-digit' });
}

function fmtRelTime(iso) {
  if (!iso) return '—';
  const t = new Date(iso).getTime();
  if (Number.isNaN(t)) return '—';
  const diff = Date.now() - t;
  if (diff < 0) return 'just now';
  const s = Math.floor(diff / 1000);
  if (s < 60) return `${s}s ago`;
  const m = Math.floor(s / 60);
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const dys = Math.floor(h / 24);
  if (dys < 30) return `${dys}d ago`;
  return new Date(iso).toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
}

function RelTime({ iso }) {
  if (!iso) return <span className="text-gray-300">—</span>;
  return (
    <span className="text-xs text-gray-500" title={fmtTime(iso)}>{fmtRelTime(iso)}</span>
  );
}

async function apiFetch(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

// ═════════════════════════════════════════════════════════════════════════════
// 3. URL routing (hash-based)
// ═════════════════════════════════════════════════════════════════════════════
//
// Hash scheme:
//   #/impact
//   #/customers              · #/customers/:tenantCode
//   #/issues                 · #/issues/:signalId
//   #/subscriptions          · #/subscriptions/list   · #/subscriptions/matrix
//
// Hash-based (rather than History API) so this works as a static asset under
// any path without server cooperation. App reads on mount, writes on state
// change, and listens to `hashchange` + `popstate` for back/forward.

const VALID_TABS = ['impact', 'customers', 'issues', 'subscriptions'];
const VALID_SUB_VIEWS = ['overview', 'list', 'matrix'];

/** Parse the current location.hash into `{ tab, detail }`. Falls back to `impact`. */
function parseHash() {
  const h = (window.location.hash || '').replace(/^#\/?/, '');
  const [rawTab, rawDetail] = h.split('/').filter(Boolean).map(decodeURIComponent);
  const tab = VALID_TABS.includes(rawTab) ? rawTab : 'impact';
  return { tab, detail: rawDetail || null };
}

/** Build a URL hash for a given tab + optional drilldown / sub-view. */
function buildHash(tab, detail) {
  return detail ? `#/${tab}/${encodeURIComponent(detail)}` : `#/${tab}`;
}

// ═════════════════════════════════════════════════════════════════════════════
// 2. Sortable / filterable table primitives
// ═════════════════════════════════════════════════════════════════════════════
//
// Every data table on the dashboard uses these three pieces. Pull `sf` out of
// `useSortFilter`, render `<TableFilter {...sf} />` above the table for the
// search input, and put `<SortHeader k="…" {...sf} />` cells in the <thead>.
// Each table renders `sf.rows` instead of the raw list.

/**
 * Stateful sort + text-filter for any homogeneous list.
 *
 * @param {Array} rows
 * @param {Object} opts
 * @param {string} [opts.defaultKey]  Column to sort by initially.
 * @param {'asc'|'desc'} [opts.defaultDir='desc']
 * @param {(row: any, needle: string) => boolean} [opts.filterFn]
 *        Receives the lowercased query string. Omit to disable text filtering.
 * @returns { rows, q, setQ, sortKey, sortDir, onSort }
 */
function useSortFilter(rows, opts = {}) {
  const { defaultKey = null, defaultDir = 'desc', filterFn = null } = opts;
  const [sortKey, setSortKey] = useState(defaultKey);
  const [sortDir, setSortDir] = useState(defaultDir);
  const [q, setQ] = useState('');

  const onSort = useCallback((key) => {
    setSortKey((prev) => {
      if (prev === key) {
        setSortDir((d) => (d === 'asc' ? 'desc' : 'asc'));
        return prev;
      }
      setSortDir('desc');
      return key;
    });
  }, []);

  const filtered = useMemo(() => {
    let list = rows || [];
    if (q.trim() && filterFn) {
      const needle = q.trim().toLowerCase();
      list = list.filter((r) => filterFn(r, needle));
    }
    if (sortKey) {
      list = [...list].sort((a, b) => {
        const av = a?.[sortKey];
        const bv = b?.[sortKey];
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        const cmp = (typeof av === 'string' || typeof bv === 'string')
          ? String(av).localeCompare(String(bv))
          : (av - bv);
        return sortDir === 'asc' ? cmp : -cmp;
      });
    }
    return list;
  }, [rows, q, sortKey, sortDir, filterFn]);

  return { rows: filtered, q, setQ, sortKey, sortDir, onSort };
}

function SortHeader({ label, k, sortKey, sortDir, onSort, align = 'left', className = '' }) {
  const active = sortKey === k;
  const alignCls = align === 'right' ? 'text-right' : align === 'center' ? 'text-center' : 'text-left';
  return (
    <th
      onClick={() => onSort(k)}
      className={`px-3 py-2 text-[11px] uppercase tracking-wide font-semibold cursor-pointer select-none hover:bg-gray-100 ${alignCls} ${active ? 'text-gray-900' : 'text-gray-500'} ${className}`}
    >
      <span className={`inline-flex items-center gap-1 ${align === 'right' ? 'justify-end w-full' : ''}`}>
        {label}
        <span className="text-[9px] text-gray-400 w-2 inline-block">{active ? (sortDir === 'asc' ? '▲' : '▼') : ''}</span>
      </span>
    </th>
  );
}

function TableFilter({ value, onChange, placeholder = 'Filter…', count, total }) {
  return (
    <div className="flex items-center gap-3 px-4 py-2 border-b border-gray-100 bg-gray-50/50">
      <input
        type="text" value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
        className="flex-1 max-w-xs rounded border border-gray-200 px-2.5 py-1 text-xs focus:outline-none focus:border-blue-500 bg-white"
      />
      {value && (
        <button onClick={() => onChange('')} className="text-xs text-gray-500 hover:text-gray-800">Clear</button>
      )}
      <span className="ml-auto text-xs text-gray-400 tabular-nums">
        {count != null && total != null && count !== total ? `${count} of ${total}` : (total != null ? `${total}` : '')}
      </span>
    </div>
  );
}

// Color palette for charts. 15 distinct hues — chart components cycle through.
const PALETTE = [
  '#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6',
  '#ec4899','#06b6d4','#84cc16','#f97316','#6366f1',
  '#14b8a6','#f43f5e','#a855f7','#0ea5e9','#22c55e',
];

function fmtDuration(ms) {
  if (ms == null || ms < 0) return '—';
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

/**
 * Stitch a chronological history list into discrete alarm events.
 *
 * Transitions:
 *   LOW → CRITICAL/WARNING : event starts
 *   CRITICAL/WARNING → LOW : event ends
 *   first non-LOW point    : treated as a start
 *   CRIT ↔ WARN            : ignored (still bad)
 *
 * Events with no `endTime` are still ongoing.
 */
function deriveAlertEvents(fingerprint, tenantCode, facilityCode, history) {
  if (!history || history.length === 0) return [];

  const isBad = (s) => s === 'CRITICAL' || s === 'WARNING';
  const sorted = [...history].sort(
    (a, b) => new Date(a.lastReceived || 0) - new Date(b.lastReceived || 0)
  );

  const events = [];
  let prevSev = null;
  let current = null;

  for (const entry of sorted) {
    const sev = (entry.severity || '').toUpperCase();
    const time = entry.lastReceived;

    const opensEvent = (prevSev === null && isBad(sev)) || (prevSev === 'LOW' && isBad(sev));
    const closesEvent = isBad(prevSev) && sev === 'LOW';

    if (opensEvent) {
      current = { fingerprint, tenantCode, facilityCode, severity: sev, startTime: time, endTime: null };
    } else if (closesEvent && current) {
      current.endTime = time;
      events.push(current);
      current = null;
    }
    prevSev = sev;
  }
  if (current) events.push({ ...current, ongoing: true });
  return events;
}

// ═════════════════════════════════════════════════════════════════════════════
// 4. Tiny UI atoms
// ═════════════════════════════════════════════════════════════════════════════

function Spinner() {
  return (
    <div className="flex items-center justify-center py-16">
      <div className="w-8 h-8 border-2 border-gray-200 border-t-gray-500 rounded-full animate-spin" />
    </div>
  );
}

function ErrorBox({ msg, onRetry }) {
  return (
    <div className="rounded border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700 flex items-center gap-3">
      <span className="flex-1">{msg}</span>
      {onRetry && <button onClick={onRetry} className="underline text-red-800 font-medium">Retry</button>}
    </div>
  );
}

function SeverityPill({ sev, size = 'sm' }) {
  const m = SEV_META[sev] || SEV_META.LOW;
  const pad = size === 'sm' ? 'px-2 py-0.5 text-xs' : 'px-3 py-1 text-sm';
  return (
    <span
      className={`inline-block rounded font-medium ${pad}`}
      style={{ background: m.bg, color: m.color, border: `1px solid ${m.border}` }}
    >
      {m.label}
    </span>
  );
}

function StatusPill({ status }) {
  const cls = STATUS_COLORS[status] || 'bg-gray-100 text-gray-600';
  return <span className={`inline-block rounded px-2 py-0.5 text-xs font-medium ${cls}`}>{status}</span>;
}

function BackButton({ onClick, label }) {
  return (
    <button onClick={onClick} className="flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-800 transition-colors">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2">
        <path d="M9 2L4 7l5 5" strokeLinecap="round" strokeLinejoin="round" />
      </svg>
      {label}
    </button>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// 5. Issues tab — Signal list, severity drilldown, history, Alert Situation
// ═════════════════════════════════════════════════════════════════════════════

function SignalCard({ signal, onClick }) {
  const { severityCounts, total } = signal;
  return (
    <button
      onClick={onClick}
      className="w-full text-left rounded-lg border border-gray-200 bg-white px-5 py-4 hover:border-gray-400 hover:bg-gray-50 transition-all fade-in"
    >
      <div className="flex items-start justify-between gap-2 mb-2">
        <div>
          <p className="font-semibold text-gray-900 leading-tight">{signal.name}</p>
          <p className="text-xs text-gray-400 mt-0.5 font-mono">{signal.signalCode}</p>
        </div>
        <span className="shrink-0 text-xs rounded bg-gray-100 text-gray-600 px-2 py-0.5 font-medium uppercase tracking-wide">
          {signal.module}
        </span>
      </div>
      <p className="text-sm text-gray-500 line-clamp-2 mb-3">{signal.description}</p>
      <div className="flex items-center gap-2">
        {['CRITICAL','WARNING','LOW'].map(s => {
          const m = SEV_META[s];
          const count = severityCounts[s];
          if (count === 0) return null;
          return (
            <span
              key={s}
              className="text-xs font-semibold px-2 py-0.5 rounded"
              style={{ background: m.bg, color: m.color, border: `1px solid ${m.border}` }}
            >
              {count} {m.label}
            </span>
          );
        })}
        {total === 0 && <span className="text-xs text-gray-400">No active alerts</span>}
      </div>
    </button>
  );
}

function SignalListScreen({ onSelectSignal }) {
  const [signals, setSignals] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const { data } = await apiFetch('/api/signals');
      setSignals(data);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { load(); }, [load]);

  const totals = signals.reduce((acc, s) => {
    acc.CRITICAL += s.severityCounts.CRITICAL;
    acc.WARNING  += s.severityCounts.WARNING;
    acc.LOW      += s.severityCounts.LOW;
    return acc;
  }, { CRITICAL: 0, WARNING: 0, LOW: 0 });

  return (
    <div>
      {/* Summary strip */}
      {signals.length > 0 && (
        <div className="flex items-center gap-4 mb-6">
          {['CRITICAL','WARNING','LOW'].map(s => {
            const m = SEV_META[s];
            return (
              <div key={s} className="flex items-center gap-1.5">
                <span className="w-2 h-2 rounded-full" style={{ background: m.color }} />
                <span className="text-sm font-semibold" style={{ color: m.color }}>{totals[s]}</span>
                <span className="text-sm text-gray-500">{m.label}</span>
              </div>
            );
          })}
          <span className="ml-auto text-xs text-gray-400">{signals.length} signals</span>
        </div>
      )}

      {loading && <Spinner />}
      {error && <ErrorBox msg={error} onRetry={load} />}

      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        {signals.map(sig => (
          <SignalCard key={sig._id} signal={sig} onClick={() => onSelectSignal(sig)} />
        ))}
      </div>
    </div>
  );
}

// ── SeverityBar ────────────────────────────────────────────────────────────

function SeverityBar({ sev, count, total, selected, onClick }) {
  const m = SEV_META[sev];
  const pct = total > 0 ? Math.round((count / total) * 100) : 0;
  const isActive = selected === sev;
  return (
    <button
      onClick={() => count > 0 && onClick(sev)}
      disabled={count === 0}
      className={`w-full rounded-lg border px-5 py-4 text-left transition-all ${
        count === 0 ? 'opacity-40 cursor-not-allowed' : 'cursor-pointer hover:opacity-90'
      } ${isActive ? 'ring-2 ring-offset-1' : ''}`}
      style={{
        background: isActive ? m.bg : '#fff',
        borderColor: isActive ? m.color : '#e5e7eb',
        ['--tw-ring-color']: m.color,
      }}
    >
      <div className="flex items-center justify-between mb-2">
        <span className="font-semibold text-base" style={{ color: m.color }}>{m.label}</span>
        <span className="text-2xl font-bold" style={{ color: m.color }}>{count}</span>
      </div>
      {/* progress bar */}
      <div className="h-1.5 rounded-full bg-gray-100 overflow-hidden">
        <div
          className="h-full rounded-full transition-all duration-300"
          style={{ width: `${pct}%`, background: m.color }}
        />
      </div>
      <p className="text-xs text-gray-400 mt-1.5">{pct}% of total</p>
    </button>
  );
}

// ── AlertTile ──────────────────────────────────────────────────────────────

function MetricChip({ heading, count, subheading }) {
  return (
    <div className="rounded bg-gray-50 border border-gray-100 px-3 py-2 text-center">
      <p className="text-xs text-gray-500">{heading}</p>
      <p className="text-lg font-bold text-gray-800">{count}</p>
      <p className="text-xs text-gray-400 leading-tight">{subheading}</p>
    </div>
  );
}

function AlertTile({ alert, onClick, active }) {
  const tpl = alert.template || {};
  const metrics = tpl.metric || [];
  return (
    <button
      onClick={onClick}
      className={`w-full text-left rounded-lg border px-4 py-4 transition-all fade-in ${
        active
          ? 'border-gray-700 bg-gray-50 ring-1 ring-gray-700'
          : 'border-gray-200 bg-white hover:border-gray-400'
      }`}
    >
      {/* heading row */}
      <div className="flex items-start gap-2 mb-2">
        <div className="flex-1 min-w-0">
          <p className="font-semibold text-gray-900 text-sm leading-tight truncate">
            {tpl.heading || alert.fingerprint}
          </p>
        </div>
        <StatusPill status={alert.status} />
      </div>

      {/* tenant / facility / fingerprint */}
      <div className="flex flex-wrap gap-x-3 gap-y-1 text-xs text-gray-500 mb-3">
        <span><span className="text-gray-400">Tenant</span> <span className="font-medium text-gray-700">{alert.tenantCode}</span></span>
        <span><span className="text-gray-400">Facility</span> <span className="font-medium text-gray-700">{alert.facilityCode}</span></span>
        {alert.fingerprint && (
          <span className="w-full mt-0.5">
            <span className="text-gray-400">Fingerprint</span>{' '}
            <span className="font-mono text-gray-600 text-xs">{alert.fingerprint}</span>
          </span>
        )}
      </div>

      {/* metrics */}
      {metrics.length > 0 && (
        <div className="grid gap-2" style={{ gridTemplateColumns: `repeat(${Math.min(metrics.length, 3)}, 1fr)` }}>
          {metrics.map((m, i) => (
            <MetricChip key={i} heading={m.heading} count={m.count} subheading={m.subheading} />
          ))}
        </div>
      )}

      {/* timestamp */}
      <p className="text-xs text-gray-400 mt-2.5">Updated {fmtTime(alert.updatedAt)}</p>
    </button>
  );
}

// ── HistoryPanel ───────────────────────────────────────────────────────────

function HistoryEntry({ entry }) {
  const sev = (entry.severity || '').toUpperCase();
  const m = SEV_META[sev] || SEV_META.LOW;
  const tpl = entry.template || {};
  const metrics = tpl.metric || [];
  return (
    <div
      className="border-b border-gray-100 last:border-0 py-4 history-slide"
      style={{ borderLeft: `3px solid ${m.color}`, paddingLeft: '12px', marginLeft: '-1px' }}
    >
      {/* heading row */}
      <div className="flex items-start gap-2 mb-1">
        <p className="flex-1 text-sm font-semibold text-gray-900 leading-tight">
          {tpl.heading || '—'}
        </p>
        <span
          className="shrink-0 text-xs font-semibold px-2 py-0.5 rounded"
          style={{ background: m.bg, color: m.color, border: `1px solid ${m.border}` }}
        >
          {m.label}
        </span>
      </div>

      {/* description */}
      {tpl.description && (
        <p className="text-xs text-gray-500 mb-2 leading-relaxed">{tpl.description}</p>
      )}

      {/* metrics */}
      {metrics.length > 0 && (
        <div className="flex flex-wrap gap-2 mb-2.5">
          {metrics.map((metric, i) => (
            <div
              key={i}
              className="rounded border px-2.5 py-1.5 text-xs flex flex-col items-center min-w-[72px]"
              style={{ background: m.bg, borderColor: m.border }}
            >
              <span className="text-gray-500 font-medium">{metric.heading}</span>
              <span className="text-xl font-bold leading-tight" style={{ color: m.color }}>{metric.count}</span>
              <span className="text-gray-500">{metric.subheading}</span>
              {metric.timestamp && (
                <span className="text-gray-400 mt-0.5 text-center leading-tight">{metric.timestamp}</span>
              )}
            </div>
          ))}
        </div>
      )}

      {/* timestamps */}
      <div className="flex flex-wrap gap-x-4 gap-y-0.5 text-xs text-gray-400 mt-1">
        {entry.lastReceived && (
          <span>Last received <span className="text-gray-600 font-medium">{fmtTime(entry.lastReceived)}</span></span>
        )}
        {entry.lastRefreshTime && (
          <span>Data refresh <span className="text-gray-600 font-medium">{fmtTime(entry.lastRefreshTime)}</span></span>
        )}
      </div>
    </div>
  );
}

function HistoryPanel({ alert, onClose }) {
  const [history, setHistory] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true); setError(null);
      try {
        const data = await apiFetch(`/api/alerts/${alert.fingerprint}/history`);
        if (!cancelled) setHistory(data.data || data || []);
      } catch (e) {
        if (!cancelled) setError(e.message);
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, [alert.fingerprint]);

  const alertSev = (alert.severity || '').toUpperCase();
  const alertMeta = SEV_META[alertSev] || SEV_META.LOW;

  return (
    <div className="rounded-lg border bg-white overflow-hidden history-slide" style={{ borderColor: alertMeta.border }}>
      <div className="flex items-start gap-3 px-4 py-3 border-b" style={{ background: alertMeta.bg, borderColor: alertMeta.border }}>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 mb-0.5">
            <span className="text-xs font-semibold" style={{ color: alertMeta.color }}>{alertMeta.label}</span>
            <StatusPill status={alert.status} />
          </div>
          <p className="text-sm font-semibold text-gray-900 truncate">{alert.template?.heading || 'Alert History'}</p>
          <div className="flex flex-wrap gap-x-3 gap-y-0.5 mt-1 text-xs text-gray-500">
            {alert.lastReceived && (
              <span>Last received <span className="font-medium text-gray-700">{fmtTime(alert.lastReceived)}</span></span>
            )}
            {alert.lastRefreshTime && (
              <span>Data refresh <span className="font-medium text-gray-700">{fmtTime(alert.lastRefreshTime)}</span></span>
            )}
          </div>
        </div>
        <button onClick={onClose} className="text-gray-400 hover:text-gray-700 transition-colors p-1 mt-0.5 shrink-0" title="Close">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2">
            <path d="M2 2l10 10M12 2L2 12" strokeLinecap="round" />
          </svg>
        </button>
      </div>
      <div className="px-4 max-h-96 overflow-y-auto">
        {loading && <Spinner />}
        {error && <div className="py-4"><ErrorBox msg={error} /></div>}
        {!loading && !error && history.length === 0 && (
          <p className="text-sm text-gray-400 py-4 text-center">No history found</p>
        )}
        {history.map((entry, i) => <HistoryEntry key={i} entry={entry} />)}
      </div>
    </div>
  );
}

// ── ChartCanvas ────────────────────────────────────────────────────────────

function ChartCanvas({ type, labels, datasets, chartOptions, height }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    const chart = new Chart(canvasRef.current, {
      type,
      data: { labels, datasets },
      options: chartOptions || {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'top' } },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
      },
    });
    return () => chart.destroy();
  }, []);
  return <div style={{ height: height || 260 }}><canvas ref={canvasRef} /></div>;
}

// ── TenantAlertsBreakdown ──────────────────────────────────────────────────

function TenantAlertsBreakdown({ dates, tenants, byDateTenant }) {
  const [selectedTenant, setSelectedTenant] = useState(null);

  // Compute total alerts per tenant, sorted descending
  const tenantTotals = tenants
    .map(t => ({ tenant: t, total: dates.reduce((s, d) => s + (byDateTenant[d]?.[t] || 0), 0) }))
    .sort((a, b) => b.total - a.total);

  const MAX_SHOWN = 20;
  const shown = tenantTotals.slice(0, MAX_SHOWN);

  // Horizontal bar chart data
  const barData = [{
    label: 'Total Alerts',
    data: shown.map(r => r.total),
    backgroundColor: shown.map((_, i) => PALETTE[i % PALETTE.length] + 'cc'),
    borderColor: shown.map((_, i) => PALETTE[i % PALETTE.length]),
    borderWidth: 1,
    borderRadius: 4,
  }];

  const barOptions = {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.x} alert${ctx.parsed.x !== 1 ? 's' : ''}` } },
    },
    scales: {
      x: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#f3f4f6' } },
      y: { grid: { display: false }, ticks: { font: { size: 11 } } },
    },
    onClick: (_, elements) => {
      if (!elements.length) return;
      const idx = elements[0].index;
      const t = shown[idx].tenant;
      setSelectedTenant(prev => prev === t ? null : t);
    },
  };

  const horizHeight = Math.max(180, shown.length * 28 + 40);

  // Trend line for selected tenant
  const trendDatasets = selectedTenant ? [{
    label: selectedTenant,
    data: dates.map(d => byDateTenant[d]?.[selectedTenant] || 0),
    fill: true,
    backgroundColor: 'rgba(59,130,246,0.10)',
    borderColor: '#3b82f6',
    borderWidth: 2,
    tension: 0.35,
    pointRadius: 4,
    pointBackgroundColor: '#3b82f6',
  }] : [];

  return (
    <div>
      {/* Ranked bar */}
      <div className="mb-1">
        <div className="flex items-center justify-between mb-2">
          <div>
            <p className="text-xs text-gray-400">
              Click a bar to see its daily trend{tenantTotals.length > MAX_SHOWN ? ` · showing top ${MAX_SHOWN} of ${tenantTotals.length}` : ''}
            </p>
          </div>
          {selectedTenant && (
            <button
              onClick={() => setSelectedTenant(null)}
              className="text-xs text-blue-600 hover:text-blue-800 underline"
            >
              Clear selection
            </button>
          )}
        </div>
        <div style={{ height: horizHeight }}>
          <ChartCanvas
            key={`hbar-${shown.map(r=>r.tenant).join(',')}`}
            type="bar"
            labels={shown.map(r => r.tenant)}
            datasets={barData}
            chartOptions={barOptions}
            height={horizHeight}
          />
        </div>
      </div>

      {/* Trend line for selected tenant */}
      {selectedTenant && (
        <div className="mt-5 pt-4 border-t border-gray-100 fade-in">
          <p className="text-xs font-semibold text-gray-700 mb-3">
            Daily trend — <span className="text-blue-600">{selectedTenant}</span>
          </p>
          <ChartCanvas
            key={`trend-${selectedTenant}-${dates.join(',')}`}
            type="line"
            labels={dates}
            datasets={trendDatasets}
            chartOptions={{
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                x: { grid: { color: '#f3f4f6' }, ticks: { font: { size: 11 } } },
                y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: '#f3f4f6' } },
              },
            }}
            height={200}
          />
        </div>
      )}
    </div>
  );
}

// ── TenantAvgResolutionChart (mean resolution time per tenant code) ───────

function TenantAvgResolutionChart({ events }) {
  const resolved = (events || []).filter((e) => e.endTime);
  const byTenant = {};
  for (const e of resolved) {
    const t = e.tenantCode || '—';
    if (!byTenant[t]) byTenant[t] = [];
    byTenant[t].push(new Date(e.endTime) - new Date(e.startTime));
  }
  const rows = Object.entries(byTenant)
    .map(([tenant, msArr]) => ({
      tenant,
      avgMs: msArr.reduce((a, b) => a + b, 0) / msArr.length,
      count: msArr.length,
    }))
    .sort((a, b) => b.avgMs - a.avgMs);

  if (rows.length === 0) {
    return (
      <p className="text-sm text-gray-400 py-6 text-center">Nothing cleared in history yet — averages appear after a return to LOW.</p>
    );
  }

  const MAX_SHOWN = 24;
  const shown = rows.slice(0, MAX_SHOWN);
  const horizHeight = Math.max(180, shown.length * 28 + 40);

  const barData = [{
    label: 'Avg resolution',
    data: shown.map((r) => Math.round(r.avgMs / 60000 * 10) / 10),
    backgroundColor: shown.map((_, i) => PALETTE[i % PALETTE.length] + 'cc'),
    borderColor: shown.map((_, i) => PALETTE[i % PALETTE.length]),
    borderWidth: 1,
    borderRadius: 4,
  }];

  const barOptions = {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: (ctx) => {
            const r = shown[ctx.dataIndex];
            return ` ${fmtDuration(r.avgMs)} (${r.count} resolved)`;
          },
        },
      },
    },
    scales: {
      x: {
        beginAtZero: true,
        title: { display: true, text: 'Minutes (avg)' },
        grid: { color: '#f3f4f6' },
      },
      y: { grid: { display: false }, ticks: { font: { size: 11 } } },
    },
  };

  return (
    <div>
      <div style={{ height: horizHeight }}>
        <ChartCanvas
          key={`res-bar-${shown.map((r) => r.tenant).join(',')}`}
          type="bar"
          labels={shown.map((r) => r.tenant)}
          datasets={barData}
          chartOptions={barOptions}
          height={horizHeight}
        />
      </div>
      {rows.length > MAX_SHOWN && (
        <p className="text-xs text-gray-400 mt-2">Showing top {MAX_SHOWN} tenants by longest avg resolution.</p>
      )}
    </div>
  );
}

// ── HeatmapGrid ────────────────────────────────────────────────────────────

function HeatmapGrid({ dates, tenants, byDateTenant }) {
  if (!dates.length || !tenants.length) return null;
  const max = Math.max(1, ...dates.flatMap(d => tenants.map(t => byDateTenant[d]?.[t] || 0)));
  const cellColor = (count) => count === 0 ? '#f3f4f6' : `rgba(220,38,38,${0.15 + (count / max) * 0.75})`;
  const shortDate = d => d.substring(5);
  return (
    <div className="overflow-x-auto">
      <table className="text-xs border-collapse" style={{ minWidth: dates.length * 44 + 180 }}>
        <thead>
          <tr>
            <th className="text-gray-400 font-medium text-left pr-3 py-1" style={{ minWidth: 180 }}>Tenant / Facility</th>
            {dates.map(d => (
              <th key={d} className="text-gray-500 font-medium text-center px-1 py-1" style={{ minWidth: 40 }}>{shortDate(d)}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {tenants.map(tenant => (
            <tr key={tenant}>
              <td className="text-gray-700 font-medium pr-3 py-0.5 truncate" style={{ maxWidth: 180 }}>{tenant}</td>
              {dates.map(d => {
                const count = byDateTenant[d]?.[tenant] || 0;
                return (
                  <td key={d} title={`${tenant} / ${d}: ${count} alert(s)`} className="text-center py-0.5 px-0.5">
                    <div
                      className="rounded mx-auto flex items-center justify-center font-semibold"
                      style={{ width: 32, height: 24, background: cellColor(count), color: count > 0 ? '#7f1d1d' : '#9ca3af', fontSize: 10 }}
                    >
                      {count || ''}
                    </div>
                  </td>
                );
              })}
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── ResolutionTable ────────────────────────────────────────────────────────

function ResolutionTable({ events }) {
  const [expandedKey, setExpandedKey] = useState(null);
  const byKey = {};
  for (const e of events) {
    const k = `${e.tenantCode}|||${e.facilityCode}|||${e.fingerprint || ''}`;
    if (!byKey[k]) byKey[k] = [];
    byKey[k].push(e);
  }
  const keys = Object.keys(byKey).sort();
  return (
    <div className="space-y-2">
      {keys.map(key => {
        const [tenantCode, facilityCode, fingerprint] = key.split('|||');
        const tevents = byKey[key];
        const resolved = tevents.filter(e => e.endTime);
        const ongoing = tevents.filter(e => !e.endTime);
        const avgMs = resolved.length > 0
          ? resolved.reduce((s, e) => s + (new Date(e.endTime) - new Date(e.startTime)), 0) / resolved.length
          : null;
        const isOpen = expandedKey === key;
        return (
          <div key={key} className="border border-gray-200 rounded-lg overflow-hidden">
            <button
              className="w-full flex items-center gap-3 px-4 py-3 bg-gray-50 hover:bg-gray-100 transition-colors text-left"
              onClick={() => setExpandedKey(isOpen ? null : key)}
            >
              <div className="flex-1 min-w-0">
                <span className="font-semibold text-gray-800 text-sm">{tenantCode}</span>
                {facilityCode && facilityCode !== 'undefined' && (
                  <span className="ml-2 text-xs text-gray-500 font-mono bg-gray-100 px-1.5 py-0.5 rounded">{facilityCode}</span>
                )}
                {fingerprint && (
                  <div className="mt-1 text-[10px] font-mono text-gray-600 break-all leading-snug">
                    <span className="text-gray-400 font-sans font-medium mr-1">Fingerprint</span>
                    {fingerprint}
                  </div>
                )}
              </div>
              <span className="text-xs text-gray-500 shrink-0">{tevents.length} alert{tevents.length !== 1 ? 's' : ''}</span>
              {ongoing.length > 0 && (
                <span className="text-xs font-medium px-2 py-0.5 rounded bg-red-100 text-red-700 shrink-0">{ongoing.length} ongoing</span>
              )}
              {avgMs !== null && (
                <span className="text-xs text-gray-500 shrink-0">Avg resolve: <span className="font-semibold text-gray-700">{fmtDuration(avgMs)}</span></span>
              )}
              <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="2"
                style={{ transform: isOpen ? 'rotate(180deg)' : 'none', transition: 'transform 0.2s' }}>
                <path d="M2 4l4 4 4-4" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </button>
            {isOpen && (
              <div className="divide-y divide-gray-100">
                {tevents.map((e, i) => {
                  const duration = e.endTime ? new Date(e.endTime) - new Date(e.startTime) : null;
                  const m = SEV_META[e.severity] || SEV_META.LOW;
                  return (
                    <div key={i} className="px-4 py-2.5 flex flex-wrap items-center gap-x-5 gap-y-1 text-xs">
                      <span className="rounded px-1.5 py-0.5 font-semibold shrink-0"
                        style={{ background: m.bg, color: m.color, border: `1px solid ${m.border}` }}>
                        {m.label}
                      </span>
                      {e.fingerprint && (
                        <span className="font-mono text-[10px] text-gray-600 max-w-[200px] truncate shrink-0" title={e.fingerprint}>fp {e.fingerprint}</span>
                      )}
                      <span className="text-gray-500">Started <span className="text-gray-700 font-medium">{fmtTime(e.startTime)}</span></span>
                      {e.endTime
                        ? <span className="text-gray-500">Resolved <span className="text-gray-700 font-medium">{fmtTime(e.endTime)}</span></span>
                        : <span className="text-red-600 font-semibold">Ongoing</span>
                      }
                      <span className="ml-auto text-gray-500 shrink-0">
                        Resolution time: <span className="font-semibold text-gray-700">{fmtDuration(duration)}</span>
                      </span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Fingerprint tables (alert situation) ───────────────────────────────────

function latestHistoryEventForAlert(events, alert) {
  const fp = alert.fingerprint;
  const list = (events || []).filter(
    (e) =>
      e.fingerprint === fp &&
      e.tenantCode === alert.tenantCode &&
      e.facilityCode === alert.facilityCode
  );
  const ongoing = list.find((e) => !e.endTime);
  if (ongoing) return ongoing;
  return list.sort((a, b) => new Date(b.startTime) - new Date(a.startTime))[0] || null;
}

function isFingerprintSubscribed(alert, subscribedFp) {
  if (!subscribedFp || alert.fingerprint == null || alert.fingerprint === '') return false;
  return subscribedFp.has(String(alert.fingerprint).trim());
}

/**
 * Show the cube / alert-condition payload for a single alert_overview row.
 * Two views: a quick "headline + metric chips + key fields" summary, and the
 * raw template JSON for debugging.
 */
function AlertConditionPayload({ alert }) {
  const tpl     = alert?.template ?? {};
  const metrics = Array.isArray(tpl.metric) ? tpl.metric : [];

  return (
    <div className="space-y-3">
      {/* Headline + description */}
      {(tpl.heading || tpl.description) && (
        <div>
          {tpl.heading && <p className="text-sm font-semibold text-gray-900">{tpl.heading}</p>}
          {tpl.description && <p className="text-xs text-gray-600 mt-0.5">{tpl.description}</p>}
        </div>
      )}

      {/* Metric chips (the actual cube values driving the alert) */}
      {metrics.length > 0 && (
        <div className="flex flex-wrap gap-2">
          {metrics.map((m, idx) => (
            <div key={idx} className="rounded border border-gray-200 bg-white px-2.5 py-1.5 text-xs flex flex-col items-center min-w-[80px]">
              <span className="text-gray-500 font-medium">{m.heading || '—'}</span>
              <span className="text-lg font-bold text-gray-900 leading-tight">{m.count != null ? Number(m.count).toLocaleString() : '—'}</span>
              {m.subheading && <span className="text-gray-500">{m.subheading}</span>}
              {m.timestamp && <span className="text-gray-400 mt-0.5 text-center leading-tight">{m.timestamp}</span>}
            </div>
          ))}
        </div>
      )}

      {/* Selected scalar fields (skip the ones already shown above) */}
      {(() => {
        const SHOWN = new Set(['heading', 'description', 'metric']);
        const extras = Object.entries(tpl).filter(([k, v]) =>
          !SHOWN.has(k) && (typeof v === 'string' || typeof v === 'number' || typeof v === 'boolean')
        );
        if (extras.length === 0) return null;
        return (
          <div className="grid grid-cols-2 sm:grid-cols-3 gap-x-4 gap-y-1 text-xs">
            {extras.map(([k, v]) => (
              <div key={k} className="flex gap-2">
                <span className="text-gray-500">{k}</span>
                <span className="text-gray-800 font-mono truncate" title={String(v)}>{String(v)}</span>
              </div>
            ))}
          </div>
        );
      })()}

      {/* Raw template JSON — collapsed by default */}
      <details className="text-xs">
        <summary className="cursor-pointer text-gray-500 hover:text-gray-800 select-none font-medium">
          Raw template JSON
        </summary>
        <pre className="mt-2 p-2 bg-gray-900 text-gray-100 rounded overflow-x-auto leading-snug" style={{ fontSize: '11px' }}>
          {JSON.stringify(tpl, null, 2)}
        </pre>
      </details>
    </div>
  );
}

function SituationFingerprintTables({ activeAlerts, allEvents, subscribedFp }) {
  const liveRows = [...(activeAlerts || [])].sort((a, b) =>
    String(a.fingerprint || '').localeCompare(String(b.fingerprint || ''))
  );

  const orphans =
    subscribedFp == null
      ? []
      : liveRows.filter((a) => !isFingerprintSubscribed(a, subscribedFp)).sort((a, b) =>
          String(a.fingerprint || '').localeCompare(String(b.fingerprint || ''))
        );

  // Track which live row is expanded to show its alert-condition JSON.
  const [expandedKey, setExpandedKey] = useState(null);
  const rowKey = (a, i) => a._id || `${i}-${a.fingerprint}`;

  const th = 'px-3 py-2 text-left text-[11px] font-bold text-gray-600 uppercase tracking-wide border-b border-gray-200 bg-gray-50';
  const td = 'px-3 py-2 align-top border-t border-gray-100 text-xs';

  return (
    <div className="space-y-4">
      <div className="rounded-xl border border-red-200 bg-white shadow-sm overflow-hidden">
        <div className="px-4 py-2.5 bg-red-50 border-b border-red-100 flex items-baseline justify-between">
          <h4 className="text-sm font-bold text-red-900">Live CRITICAL / WARNING (overview)</h4>
          <span className="text-[11px] text-red-700/70">Click a row to inspect its alert-condition payload</span>
        </div>
        <div className="overflow-x-auto max-h-96 overflow-y-auto">
          {liveRows.length === 0 ? (
            <p className="px-4 py-6 text-sm text-gray-400 text-center">No CRITICAL/WARNING rows in this snapshot.</p>

            <table className="min-w-full">
              <thead className="sticky top-0">
                <tr>
                  <th className={`${th} w-6`}></th>
                  <th className={th}>Fingerprint</th>
                  <th className={th}>Tenant</th>
                  <th className={th}>Facility</th>
                  <th className={th}>Severity</th>
                  <th className={th}>Headline</th>
                </tr>
              </thead>
              <tbody>
                {liveRows.map((a, i) => {
                  const k = rowKey(a, i);
                  const isOpen = expandedKey === k;
                  return (
                    <React.Fragment key={k}>
                      <tr onClick={() => setExpandedKey(isOpen ? null : k)}
                          className="hover:bg-red-50/60 cursor-pointer">
                        <td className={`${td} text-gray-400`}>
                          <span style={{ display: 'inline-block', transform: isOpen ? 'rotate(90deg)' : 'none', transition: 'transform 0.15s' }}>▸</span>
                        </td>
                        <td className={`${td} font-mono text-[11px] text-gray-900 max-w-xs break-all`}>{a.fingerprint || '—'}</td>
                        <td className={`${td} text-gray-800`}>{a.tenantCode || '—'}</td>
                        <td className={`${td} font-mono text-gray-600`}>{a.facilityCode || '—'}</td>
                        <td className={td}><SeverityPill sev={(a.severity || '').toUpperCase()} /></td>
                        <td className={`${td} text-gray-700 truncate max-w-md`} title={a.template?.heading || ''}>
                          {a.template?.heading || <span className="text-gray-300">—</span>}
                        </td>
                      </tr>
                      {isOpen && (
                        <tr key={`${k}-payload`} className="bg-slate-50/80">
                          <td></td>
                          <td colSpan="5" className="px-3 py-3 border-t border-gray-100">
                            <AlertConditionPayload alert={a} />
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      </div>

      <div className="rounded-xl border border-amber-200 bg-white shadow-sm overflow-hidden">
        <div className="px-4 py-2.5 bg-amber-50 border-b border-amber-100">
          <h4 className="text-sm font-bold text-amber-900">Not in subscription config (fingerprint)</h4>
        </div>
        <div className="overflow-x-auto max-h-72 overflow-y-auto">
          {subscribedFp == null ? (
            <p className="px-4 py-6 text-sm text-amber-700 text-center">Loading subscription fingerprints…</p>
          ) : orphans.length === 0 ? (
            <p className="px-4 py-6 text-sm text-gray-400 text-center">
              No orphans — every active-alert fingerprint appears in signal_subscription_config (or there are no CRITICAL/WARNING rows).
            </p>
          ) : (
            <table className="min-w-full">
              <thead>
                <tr>
                  <th className={th}>Fingerprint</th>
                  <th className={th}>Tenant</th>
                  <th className={th}>Facility</th>
                  <th className={th}>Severity</th>
                  <th className={th}>Start (history)</th>
                  <th className={th}>Resolve (history)</th>
                </tr>
              </thead>
              <tbody>
                {orphans.map((a, i) => {
                  const ep = latestHistoryEventForAlert(allEvents, a);
                  return (
                    <tr key={a._id || `orph-${i}-${a.fingerprint}`} className="hover:bg-amber-50/50">
                      <td className={`${td} font-mono text-[11px] text-gray-900 max-w-xs break-all`}>{a.fingerprint || '—'}</td>
                      <td className={`${td} text-gray-800`}>{a.tenantCode || '—'}</td>
                      <td className={`${td} font-mono text-gray-600`}>{a.facilityCode || '—'}</td>
                      <td className={td}><SeverityPill sev={(a.severity || '').toUpperCase()} /></td>
                      <td className={`${td} text-gray-700 whitespace-nowrap`}>{ep ? fmtTime(ep.startTime) : '—'}</td>
                      <td className={td}>
                        {ep && !ep.endTime && <span className="text-red-600 font-semibold">Ongoing</span>}
                        {ep && ep.endTime && <span className="text-gray-700 whitespace-nowrap">{fmtTime(ep.endTime)}</span>}
                        {!ep && <span className="text-gray-400">No history yet</span>}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
}

// ── AlertingSituationView ──────────────────────────────────────────────────
// Total alert = CRITICAL/WARNING rows + LOW rows in overview with same tenant · facility · signalId.
// History fetched for CRITICAL/WARNING fingerprints. Orphans = not in signal_subscription_config.

function AlertingSituationView({ signalId, alerts }) {
  const activeAlerts = useMemo(() => {
    return (alerts || []).filter((a) => {
      const s = (a.severity || '').toUpperCase();
      return s === 'CRITICAL' || s === 'WARNING';
    });
  }, [alerts]);

  const siteKeysFromActive = useMemo(() => {
    const set = new Set();
    for (const a of activeAlerts) {
      set.add(`${a.tenantCode ?? ''}|${a.facilityCode ?? ''}|${a.signalId ?? ''}`);
    }
    return set;
  }, [activeAlerts]);

  const extraLowOverviewRows = useMemo(() => {
    let n = 0;
    for (const a of alerts || []) {
      if ((a.severity || '').toUpperCase() !== 'LOW') continue;
      const k = `${a.tenantCode ?? ''}|${a.facilityCode ?? ''}|${a.signalId ?? ''}`;
      if (siteKeysFromActive.has(k)) n += 1;
    }
    return n;
  }, [alerts, siteKeysFromActive]);

  const totalAlertCount = activeAlerts.length + extraLowOverviewRows;

  const [subscribedFp, setSubscribedFp] = useState(null);
  const [allEvents, setAllEvents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [progress, setProgress] = useState(0);

  useEffect(() => {
    if (!signalId) {
      setSubscribedFp(new Set());
      return undefined;
    }
    let cancelled = false;
    setSubscribedFp(null);
    apiFetch(`/api/signals/${signalId}/subscription-fingerprints`)
      .then((r) => {
        if (!cancelled) setSubscribedFp(new Set(r.data || []));
      })
      .catch(() => {
        if (!cancelled) setSubscribedFp(new Set());
      });
    return () => { cancelled = true; };
  }, [signalId]);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    setError(null);
    setAllEvents([]);
    setProgress(0);

    const list = (activeAlerts || []).filter((a) => a.fingerprint);
    if (list.length === 0) {
      setLoading(false);
      return () => { cancelled = true; };
    }

    // One batched POST instead of N parallel GETs. The browser caps concurrent
    // connections to a single origin (~6 for HTTP/1.1) — server-side fan-out
    // hits the upstream API with a higher concurrency cap and returns one
    // combined payload. Typically 3–5× faster than the per-fingerprint loop.
    const fingerprints = list.map((a) => a.fingerprint);
    setProgress(0);
    fetch('/api/alerts/histories', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fingerprints }),
    })
      .then((res) => {
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        return res.json();
      })
      .then(({ histories = {}, errors = {} }) => {
        if (cancelled) return;
        const events = [];
        for (const a of list) {
          const h = histories[a.fingerprint];
          if (!h) continue; // missing or upstream-failed; skip
          const arr = Array.isArray(h) ? h : (h.data || []);
          events.push(...deriveAlertEvents(a.fingerprint, a.tenantCode, a.facilityCode, arr));
        }
        const failedCount = Object.keys(errors).length;
        if (failedCount > 0) console.warn(`[history] ${failedCount} fingerprint(s) failed upstream`, errors);
        setAllEvents(events);
        setProgress(100);
        setLoading(false);
      })
      .catch((e) => {
        if (!cancelled) {
          setError(e.message);
          setLoading(false);
        }
      });

    return () => { cancelled = true; };
  }, [activeAlerts]);

  const tenantFacilityKey = (e) => `${e.tenantCode} / ${e.facilityCode}`;
  const tenantCodeKey = (e) => e.tenantCode || '—';

  const tenants = [...new Set(allEvents.map(tenantFacilityKey))].sort();
  const tenantsByCode = [...new Set(allEvents.map(tenantCodeKey))].sort();

  const byDateTenant = {};
  const byDateTenantCode = {};
  for (const e of allEvents) {
    const date = e.startTime ? e.startTime.substring(0, 10) : 'unknown';
    const tf = tenantFacilityKey(e);
    const tc = tenantCodeKey(e);
    if (!byDateTenant[date]) byDateTenant[date] = {};
    byDateTenant[date][tf] = (byDateTenant[date][tf] || 0) + 1;
    if (!byDateTenantCode[date]) byDateTenantCode[date] = {};
    byDateTenantCode[date][tc] = (byDateTenantCode[date][tc] || 0) + 1;
  }
  const dates = Object.keys(byDateTenant).sort();

  const resolved = allEvents.filter((e) => e.endTime);
  const ongoing = allEvents.filter((e) => !e.endTime);
  const now = Date.now();

  const resolvedDurations = resolved.map((e) => new Date(e.endTime) - new Date(e.startTime));
  const ongoingDurations = ongoing.map((e) => now - new Date(e.startTime).getTime());

  const avgResolutionMs = resolvedDurations.length > 0
    ? resolvedDurations.reduce((s, n) => s + n, 0) / resolvedDurations.length
    : null;
  const medianResolutionMs = (() => {
    if (resolvedDurations.length === 0) return null;
    const sorted = [...resolvedDurations].sort((a, b) => a - b);
    const m = Math.floor(sorted.length / 2);
    return sorted.length % 2 ? sorted[m] : Math.round((sorted[m - 1] + sorted[m]) / 2);
  })();
  const longestOngoingMs = ongoingDurations.length > 0 ? Math.max(...ongoingDurations) : null;
  const totalImpactMs = ongoingDurations.reduce((s, n) => s + n, 0)
    + resolvedDurations.reduce((s, n) => s + n, 0);

  const customersInEvents = new Set(allEvents.map((e) => e.tenantCode).filter(Boolean));
  const sitesInEvents = new Set(allEvents.map((e) => `${e.tenantCode}|${e.facilityCode}`));

  // Aging buckets for currently-ongoing alarms
  const ageBuckets = [
    { label: '<1h', max: 3600_000, count: 0, color: '#16a34a' },
    { label: '1–6h', max: 6 * 3600_000, count: 0, color: '#facc15' },
    { label: '6–24h', max: 24 * 3600_000, count: 0, color: '#f97316' },
    { label: '>24h', max: Infinity, count: 0, color: '#dc2626' },
  ];
  for (const ms of ongoingDurations) {
    for (const b of ageBuckets) { if (ms < b.max) { b.count += 1; break; } }
  }

  // Resolution speed buckets (cleared)
  const resBuckets = [
    { label: 'within 1h', max: 3600_000, count: 0 },
    { label: 'within 6h', max: 6 * 3600_000, count: 0 },
    { label: 'within 24h', max: 24 * 3600_000, count: 0 },
    { label: '>24h', max: Infinity, count: 0 },
  ];
  for (const ms of resolvedDurations) {
    for (const b of resBuckets) { if (ms < b.max) { b.count += 1; break; } }
  }

  let critLive = 0;
  let warnLive = 0;
  for (const a of activeAlerts) {
    const s = (a.severity || '').toUpperCase();
    if (s === 'CRITICAL') critLive++;
    else if (s === 'WARNING') warnLive++;
  }
  const liveBreaching = critLive + warnLive;

  const fmtCustomerHours = (ms) => {
    if (ms == null || ms <= 0) return '0h';
    const h = ms / 3600_000;
    if (h >= 100) return `${Math.round(h).toLocaleString('en-IN')}h`;
    if (h >= 10) return `${h.toFixed(0)}h`;
    return `${h.toFixed(1)}h`;
  };

  const [chartGran, setChartGran] = useState('day'); // 'day' | 'hour'
  const [chartCut, setChartCut] = useState('total'); // 'total' | 'severity' | 'tenant' | 'lifecycle'

  const escChart = useMemo(() => {
    // Buckets keyed by epoch-ms at the start of the LOCAL day/hour, so the
    // x-axis aligns to the user's clock rather than UTC.
    const allKeys = new Set();
    const buckets = {}; // epochMs -> { series: count }
    const addPoint = (iso, series) => {
      const k = localBucketStart(iso, chartGran);
      if (k == null) return;
      allKeys.add(k);
      if (!buckets[k]) buckets[k] = {};
      buckets[k][series] = (buckets[k][series] || 0) + 1;
    };

    if (chartCut === 'total') {
      for (const e of allEvents) addPoint(e.startTime, 'Escalations');
    } else if (chartCut === 'severity') {
      for (const e of allEvents) addPoint(e.startTime, (e.severity || 'OTHER'));
    } else if (chartCut === 'tenant') {
      const tot = {};
      for (const e of allEvents) tot[e.tenantCode || '—'] = (tot[e.tenantCode || '—'] || 0) + 1;
      const top = Object.entries(tot).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([t]) => t);
      const topSet = new Set(top);
      for (const e of allEvents) {
        const k = topSet.has(e.tenantCode) ? e.tenantCode : 'Other';
        addPoint(e.startTime, k);
      }
    } else if (chartCut === 'lifecycle') {
      for (const e of allEvents) addPoint(e.startTime, 'Escalated');
      for (const e of allEvents) if (e.endTime) addPoint(e.endTime, 'Resolved');
    }

    const keys = [...allKeys].sort((a, b) => a - b);
    const seriesSet = new Set();
    for (const k of keys) for (const s of Object.keys(buckets[k] || {})) seriesSet.add(s);
    let series = [...seriesSet];
    // Stable order for known series
    if (chartCut === 'severity') {
      const order = ['CRITICAL', 'WARNING', 'LOW', 'OTHER'];
      series.sort((a, b) => order.indexOf(a) - order.indexOf(b));
    } else if (chartCut === 'lifecycle') {
      series = ['Escalated', 'Resolved'].filter((s) => seriesSet.has(s));
    } else if (chartCut === 'tenant') {
      series.sort((a, b) => {
        if (a === 'Other') return 1;
        if (b === 'Other') return -1;
        return 0;
      });
    }

    const colorFor = (name, idx) => {
      if (chartCut === 'severity') {
        if (name === 'CRITICAL') return '#dc2626';
        if (name === 'WARNING') return '#f59e0b';
        if (name === 'LOW') return '#2563eb';
        return '#9ca3af';
      }
      if (chartCut === 'lifecycle') {
        if (name === 'Escalated') return '#dc2626';
        if (name === 'Resolved') return '#16a34a';
      }
      if (chartCut === 'total') return '#3b82f6';
      return PALETTE[idx % PALETTE.length];
    };

    const stacked = chartCut === 'tenant';
    const chartType = stacked ? 'bar' : 'line';

    const datasets = series.map((s, idx) => {
      const c = colorFor(s, idx);
      const base = { label: s, data: keys.map((k) => buckets[k]?.[s] || 0) };
      if (stacked) {
        return { ...base, backgroundColor: c, borderColor: c, borderWidth: 1, stack: 'tenants', borderRadius: 2 };
      }
      return {
        ...base,
        borderColor: c,
        backgroundColor: chartCut === 'total' ? 'rgba(59,130,246,0.12)' : c + '22',
        borderWidth: 2,
        tension: 0.3,
        pointRadius: 3,
        pointBackgroundColor: c,
        fill: chartCut === 'total',
      };
    });

    // Manual tick stride keeps the x-axis readable across windows of any size.
    const tickStride = Math.max(1, Math.ceil(keys.length / (chartGran === 'hour' ? 14 : 12)));

    return {
      type: chartType,
      labels: keys.map((k) => fmtBucketLabel(k, chartGran)),
      // Keep the raw epoch keys around so the tooltip can show full local time.
      _bucketEpochs: keys,
      datasets,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: stacked ? 'index' : 'nearest', intersect: !stacked },
        plugins: {
          legend: {
            position: 'top', display: chartCut !== 'total',
            labels: { boxWidth: 12, padding: 14, font: { size: 11 }, usePointStyle: !stacked },
          },
          tooltip: {
            backgroundColor: 'rgba(15,23,42,0.92)',
            padding: 10, cornerRadius: 6,
            titleFont: { size: 12, weight: 'bold' }, bodyFont: { size: 12 },
            callbacks: {
              title: (items) => fmtBucketTooltip(keys[items[0].dataIndex], chartGran),
              label: (ctx) => {
                const v = ctx.parsed.y;
                return ` ${ctx.dataset.label}: ${v.toLocaleString()} event${v === 1 ? '' : 's'}`;
              },
              footer: stacked ? (items) => {
                const total = items.reduce((s, i) => s + (i.parsed.y || 0), 0);
                return `Total: ${total.toLocaleString()}`;
              } : undefined,
            },
          },
        },
        scales: {
          x: {
            stacked, grid: { display: false },
            ticks: {
              color: '#6b7280', font: { size: 11 },
              autoSkip: true, maxRotation: chartGran === 'hour' ? 30 : 0,
              callback: function (_, idx) {
                return idx % tickStride === 0 ? this.getLabelForValue(idx) : '';
              },
            },
          },
          y: {
            stacked, beginAtZero: true,
            grid: { color: '#f3f4f6', drawBorder: false },
            ticks: { color: '#6b7280', font: { size: 11 }, precision: 0, padding: 6, callback: (v) => v.toLocaleString() },
            title: { display: true, text: 'Events', color: '#6b7280', font: { size: 11, weight: '500' } },
          },
        },
      },
    };
  }, [allEvents, chartGran, chartCut]);

  if (loading) {
    return (
      <div className="py-10 text-center fade-in">
        <Spinner />
        <p className="text-sm text-gray-600 mt-3">Loading… {progress}%</p>
        <div className="w-56 h-1.5 bg-gray-200 rounded-full mx-auto mt-3">
          <div className="h-full bg-blue-500 rounded-full transition-all duration-300" style={{ width: `${progress}%` }} />
        </div>
      </div>
    );
  }

  if (error) {
    return <ErrorBox msg={error} />;
  }

  return (
    <div className="space-y-5 fade-in">
      {/* Scope row — who/how-much is impacted right now */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <KpiTile
          label="Customers affected"
          value={customersInEvents.size}
          sub={`across ${sitesInEvents.size} site${sitesInEvents.size !== 1 ? 's' : ''}`}
          accent="#b91c1c" tone="bg-red-50/60 border-red-200"
        />
        <KpiTile
          label="Currently ongoing"
          value={ongoing.length}
          sub={`${critLive} Critical · ${warnLive} Warning live`}
          accent="#b91c1c" tone="bg-red-50/60 border-red-200"
        />
        <KpiTile
          label="Customer-hours of impact"
          value={fmtCustomerHours(totalImpactMs)}
          sub="Sum of all alarm durations"
          accent="#0e7490" tone="bg-cyan-50/60 border-cyan-200"
        />
        <KpiTile
          label="Longest open"
          value={longestOngoingMs != null ? fmtDuration(longestOngoingMs) : '—'}
          sub={longestOngoingMs != null ? 'Of currently-ongoing alarms' : 'No ongoing alarms'}
          accent="#b45309" tone="bg-amber-50/60 border-amber-200"
        />
      </div>

      {/* Lifecycle row — events & resolution performance */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <KpiTile
          label="Total alarm events"
          value={allEvents.length}
          sub={`${resolved.length} cleared · ${ongoing.length} ongoing`}
          accent="#0f172a"
        />
        <KpiTile
          label="Total alert (snapshot)"
          value={totalAlertCount}
          sub={`${activeAlerts.length} live + ${extraLowOverviewRows} LOW (same tenant · facility · signal)`}
          accent="#0f172a"
        />
        <KpiTile
          label="Median time to clear"
          value={medianResolutionMs != null ? fmtDuration(medianResolutionMs) : '—'}
          sub={`avg ${avgResolutionMs != null ? fmtDuration(avgResolutionMs) : '—'}`}
          accent="#0f172a"
        />
        <KpiTile
          label="Cleared within 1h"
          value={resolved.length > 0 ? `${Math.round((resBuckets[0].count / resolved.length) * 100)}%` : '—'}
          sub={resolved.length > 0 ? `${resBuckets[0].count} of ${resolved.length} cleared` : 'No cleared events'}
          accent="#16a34a" tone="bg-green-50/60 border-green-200"
        />
      </div>

      {/* Aging buckets — where ongoing alarms sit */}
      {ongoing.length > 0 && (
        <div className="rounded-xl border border-gray-200 bg-white shadow-sm overflow-hidden">
          <div className="px-4 py-3 border-b border-gray-100 flex items-baseline justify-between">
            <h4 className="text-sm font-bold text-gray-800">Aging of ongoing alarms</h4>
            <span className="text-xs text-gray-500">{ongoing.length} ongoing</span>
          </div>
          <div className="px-4 py-4">
            <div className="flex h-7 rounded-md overflow-hidden border border-gray-100">
              {ageBuckets.map((b) => {
                const pct = (b.count / ongoing.length) * 100;
                if (pct === 0) return null;
                return (
                  <div key={b.label} title={`${b.label}: ${b.count} alarm${b.count !== 1 ? 's' : ''}`}
                       style={{ width: `${pct}%`, background: b.color }}
                       className="flex items-center justify-center text-[11px] font-semibold text-white">
                    {pct >= 8 ? `${b.count}` : ''}
                  </div>
                );
              })}
            </div>
            <div className="flex flex-wrap gap-x-5 gap-y-1 mt-3 text-xs">
              {ageBuckets.map((b) => (
                <span key={b.label} className="flex items-center gap-1.5">
                  <span className="w-2.5 h-2.5 rounded-sm" style={{ background: b.color }} />
                  <span className="text-gray-600 font-medium">{b.label}</span>
                  <span className="text-gray-400 tabular-nums">{b.count}</span>
                </span>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* Resolution speed — distribution of cleared events */}
      {resolved.length > 0 && (
        <div className="rounded-xl border border-gray-200 bg-white shadow-sm overflow-hidden">
          <div className="px-4 py-3 border-b border-gray-100 flex items-baseline justify-between">
            <h4 className="text-sm font-bold text-gray-800">How quickly we clear alarms</h4>
            <span className="text-xs text-gray-500">{resolved.length} cleared</span>
          </div>
          <div className="px-4 py-4 space-y-2">
            {resBuckets.map((b, idx) => {
              const pct = (b.count / resolved.length) * 100;
              const color = ['#16a34a', '#84cc16', '#f59e0b', '#dc2626'][idx];
              return (
                <div key={b.label} className="flex items-center gap-3 text-xs">
                  <span className="w-24 shrink-0 text-gray-700 font-medium">{b.label}</span>
                  <div className="flex-1 h-5 bg-gray-100 rounded overflow-hidden">
                    <div className="h-full rounded flex items-center px-2 text-white font-semibold"
                         style={{ width: `${Math.max(pct, b.count > 0 ? 4 : 0)}%`, background: color }}>
                      {b.count > 0 && pct >= 6 ? `${b.count}` : ''}
                    </div>
                  </div>
                  <span className="w-12 shrink-0 text-right tabular-nums text-gray-600">{Math.round(pct)}%</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {alerts && alerts.length > 0 && (
        <SituationFingerprintTables
          activeAlerts={activeAlerts}
          allEvents={allEvents}
          subscribedFp={subscribedFp}
        />
      )}

      {allEvents.length === 0 ? (
        <div className="text-center py-12 text-sm text-gray-500 bg-white rounded-xl border border-gray-200">
          <p className="font-medium text-gray-700">No history loaded yet for live CRITICAL/WARNING fingerprints</p>
          <p className="text-xs text-gray-400 mt-2 max-w-md mx-auto">Charts appear after history returns escalations for those rows. Overview tables above still show the current snapshot.</p>
        </div>
      ) : (
        <>
          <div className="rounded-xl border border-gray-200 bg-white p-4 shadow-sm">
            <div className="flex flex-wrap items-start justify-between gap-3 mb-3">
              <div>
                <h4 className="text-sm font-bold text-gray-800">Escalations over time</h4>
                <p className="text-xs text-gray-500 mt-0.5">
                  {chartCut === 'total' && 'Aggregated across tenant/facility streams for this signal.'}
                  {chartCut === 'severity' && 'Split by severity at the moment of escalation.'}
                  {chartCut === 'tenant' && 'Stacked by top 5 tenants (rest grouped as "Other").'}
                  {chartCut === 'lifecycle' && 'Escalations vs resolutions — when alarms started vs cleared.'}
                </p>
              </div>
              <div className="flex flex-wrap items-center gap-2">
                <div className="inline-flex rounded-md border border-gray-200 bg-gray-50 p-0.5 text-xs font-semibold">
                  {[{k:'day',l:'Day'},{k:'hour',l:'Hour'}].map((o) => (
                    <button key={o.k} onClick={() => setChartGran(o.k)}
                      className={`px-2.5 py-1 rounded ${chartGran === o.k ? 'bg-white shadow text-gray-900' : 'text-gray-500 hover:text-gray-800'}`}>
                      {o.l}
                    </button>
                  ))}
                </div>
                <div className="inline-flex rounded-md border border-gray-200 bg-gray-50 p-0.5 text-xs font-semibold">
                  {[
                    {k:'total',l:'Total'},
                    {k:'severity',l:'By severity'},
                    {k:'tenant',l:'By tenant'},
                    {k:'lifecycle',l:'Lifecycle'},
                  ].map((o) => (
                    <button key={o.k} onClick={() => setChartCut(o.k)}
                      className={`px-2.5 py-1 rounded ${chartCut === o.k ? 'bg-white shadow text-gray-900' : 'text-gray-500 hover:text-gray-800'}`}>
                      {o.l}
                    </button>
                  ))}
                </div>

// ── SignalDetail screen ────────────────────────────────────────────────────

function SignalDetailScreen({ signal, onBack, onSelectCustomer }) {
  const [selectedSev, setSelectedSev] = useState(null);
  const [alerts, setAlerts] = useState([]);
  const [critSummary, setCritSummary] = useState(null);
  const [alertLoading, setAlertLoading] = useState(false);
  const [alertError, setAlertError] = useState(null);
  const [activeAlert, setActiveAlert] = useState(null);
  const [showAffected, setShowAffected] = useState(true);

  // Global situation toggle — covers ALL severities
  const [showSituation, setShowSituation] = useState(false);
  const [allAlerts, setAllAlerts] = useState(null); // null = not yet fetched
  const [allAlertsLoading, setAllAlertsLoading] = useState(false);
  const [allAlertsError, setAllAlertsError] = useState(null);

  const total = signal.severityCounts.CRITICAL + signal.severityCounts.WARNING + signal.severityCounts.LOW;

  const toggleSituation = useCallback(async () => {
    if (showSituation) { setShowSituation(false); return; }
    setShowSituation(true);
    if (allAlerts !== null) return; // already fetched
    setAllAlertsLoading(true); setAllAlertsError(null);
    try {
      const { data } = await apiFetch(`/api/alerts?${new URLSearchParams({ signalId: signal._id })}`);
      setAllAlerts(data || []);
    } catch (e) { setAllAlertsError(e.message); }
    finally { setAllAlertsLoading(false); }
  }, [showSituation, allAlerts, signal._id]);

  const selectSeverity = useCallback(async (sev) => {
    if (sev === selectedSev) { setSelectedSev(null); setAlerts([]); setCritSummary(null); setActiveAlert(null); return; }
    setSelectedSev(sev);
    setActiveAlert(null);
    setAlertLoading(true); setAlertError(null);
    try {
      const params = new URLSearchParams({ signalId: signal._id, severity: sev });
      const { data, summary } = await apiFetch(`/api/alerts?${params}`);
      setAlerts(data);
      setCritSummary(summary);
    } catch (e) { setAlertError(e.message); }
    finally { setAlertLoading(false); }
  }, [selectedSev, signal._id]);

  const handleAlertClick = useCallback((alert) => {
    setActiveAlert(prev => prev?._id === alert._id ? null : alert);
  }, []);

  return (
    <div className="fade-in">
      {/* breadcrumb + global toggle */}
      <div className="mb-6 flex items-start gap-3">
        <div className="flex-1">
          <BackButton onClick={onBack} label="All Issues" />
          <h2 className="text-xl font-bold text-gray-900 mt-2">{signal.name}</h2>
          {signal.description && <p className="text-sm text-gray-500 mt-1">{signal.description}</p>}
        </div>
        <button
          onClick={() => setShowAffected((v) => !v)}
          className={`mt-1 shrink-0 px-3 py-2 rounded-lg border font-semibold text-sm transition-all ${
            showAffected
              ? 'bg-gray-900 text-white border-gray-900'
              : 'bg-white text-gray-700 border-gray-300 hover:border-gray-500'
          }`}
        >
          Affected customers
        </button>
        <button
          onClick={toggleSituation}
          className={`mt-1 shrink-0 flex items-center gap-2 px-4 py-2 rounded-lg border font-semibold text-sm transition-all ${
            showSituation
              ? 'bg-blue-600 text-white border-blue-600 shadow'
              : 'bg-white text-gray-700 border-gray-300 hover:border-blue-400 hover:text-blue-600 hover:bg-blue-50'
          }`}
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
            <path d="M18 20V10M12 20V4M6 20v-6" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
          Alert Situation
        </button>
      </div>

      {showAffected && !showSituation && onSelectCustomer && (
        <div className="mb-6">
          <AffectedCustomersPanel signalId={signal._id} onSelectCustomer={onSelectCustomer} />
        </div>
      )}

      {/* Global situation view */}
      {showSituation && (
        <div className="fade-in">
          {allAlertsLoading && (
            <div className="py-8 text-center">
              <Spinner />
              <p className="text-sm text-gray-400 mt-2">Loading all alerts…</p>
            </div>
          )}
          {allAlertsError && <ErrorBox msg={allAlertsError} />}
          {!allAlertsLoading && !allAlertsError && allAlerts !== null && (
            <AlertingSituationView key="global-situation" signalId={signal._id} alerts={allAlerts} />
          )}
        </div>
      )}

      {/* Normal severity view — hidden when situation is open */}
      {!showSituation && (
        <>
          {/* severity bars */}
          <div className="grid grid-cols-3 gap-3 mb-6">
            {['CRITICAL','WARNING','LOW'].map(sev => (
              <SeverityBar
                key={sev}
                sev={sev}
                count={signal.severityCounts[sev]}
                total={total}
                selected={selectedSev}
                onClick={selectSeverity}
              />
            ))}
          </div>

          {/* alert list */}
          {selectedSev && (
            <div className="fade-in">
              {selectedSev === 'CRITICAL' && critSummary && (
                <div className="rounded-lg border border-red-200 bg-red-50 px-5 py-3 mb-4 flex flex-wrap gap-6 fade-in">
                  <div>
                    <p className="text-xs text-red-400 uppercase tracking-wider font-medium">Affected Tenants</p>
                    <p className="text-2xl font-bold text-red-700">{critSummary.tenantCount}</p>
                  </div>
                  <div>
                    <p className="text-xs text-red-400 uppercase tracking-wider font-medium">Affected Facilities</p>
                    <p className="text-2xl font-bold text-red-700">{critSummary.facilityCount}</p>
                  </div>
                  <div className="ml-auto flex items-center">
                    <span className="text-sm text-red-600 font-semibold">{signal.severityCounts.CRITICAL} Critical Alerts</span>
                  </div>
                </div>
              )}

              <h3 className="text-sm font-semibold text-gray-700 mb-3">
                {SEV_META[selectedSev].label} Alerts
                <span className="text-gray-400 font-normal ml-2">· {signal.severityCounts[selectedSev]}</span>
              </h3>

              {alertLoading && <Spinner />}
              {alertError && <ErrorBox msg={alertError} />}

              <div className={`${activeAlert ? 'grid gap-4' : ''}`} style={activeAlert ? { gridTemplateColumns: '1fr 420px' } : {}}>
                <div className="grid grid-cols-1 gap-3 content-start">
                  {!alertLoading && alerts.map(alert => (
                    <AlertTile
                      key={alert._id}
                      alert={alert}
                      onClick={() => handleAlertClick(alert)}
                      active={activeAlert?._id === alert._id}
                    />
                  ))}
                  {!alertLoading && !alertError && alerts.length === 0 && (
                    <p className="text-sm text-gray-400 py-6 text-center">No alerts found</p>
                  )}
                </div>
                {activeAlert && (
                  <div className="self-start sticky top-4">
                    <h3 className="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Alert History</h3>
                    <HistoryPanel alert={activeAlert} onClose={() => setActiveAlert(null)} />
                  </div>
                )}
              </div>
            </div>
          )}

          {!selectedSev && (
            <p className="text-sm text-gray-400 text-center py-8">Select a severity bar to see alerts</p>
          )}
        </>
      )}
    </div>
  );
}
