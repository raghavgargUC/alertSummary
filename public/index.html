// ── Impact dashboard (landing) ─────────────────────────────────────────────

function ImpactDashboard({ onSelectIssue, onSelectCustomer }) {
  const [overview, setOverview] = useState(null);
  const [topCustomers, setTopCustomers] = useState([]);
  const [topIssues, setTopIssues] = useState([]);
  const [categories, setCategories] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      // Serial — each endpoint runs its own $lookup against alert_overview.
      // Firing them in parallel piles concurrent aggregations on Mongo.
      const o    = await apiFetch('/api/impact/overview');
      setOverview(o.data);
      const c    = await apiFetch('/api/impact/top-customers?limit=10');
      setTopCustomers(c.data);
      const i    = await apiFetch('/api/impact/top-issues?limit=10');
      setTopIssues(i.data);
      const cats = await apiFetch('/api/impact/categories');
      setCategories(cats.data);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }, []);
  useEffect(() => { load(); }, [load]);

  if (loading) return <Spinner />;
  if (error) return <ErrorBox msg={error} onRetry={load} />;
  if (!overview) return null;

  const pct = (n, d) => d > 0 ? `${Math.round((n / d) * 100)}% of ${d}` : '—';

  return (
    <div className="space-y-6 fade-in">
      {/* Headline KPI strip */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <KpiTile
          label="Customers affected"
          value={overview.customersAffected}
          sub={pct(overview.customersAffected, overview.totalCustomers)}
          accent="#b91c1c"
          tone="bg-red-50/60 border-red-200"
        />
        <KpiTile
          label="Sites affected"
          value={overview.sitesAffected}
          sub={pct(overview.sitesAffected, overview.totalSites)}
          accent="#b91c1c"
          tone="bg-red-50/60 border-red-200"
        />
        <KpiTile
          label="Active issues"
          value={overview.instances}
          sub={`${overview.criticalCount} critical · ${overview.warningCount} warning`}
          accent="#0f172a"
        />
        <KpiTile
          label="Coverage"
          value={overview.totalSubscriptions.toLocaleString('en-IN')}
          sub={`${overview.totalCustomers} customers · ${overview.totalSites.toLocaleString('en-IN')} sites tracked`}
          accent="#0f172a"
        />
      </div>

      {/* Top customers + Top issues side-by-side */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <ImpactCustomersTable rows={topCustomers} onSelectCustomer={onSelectCustomer} />
        <ImpactIssuesTable rows={topIssues} onSelectIssue={onSelectIssue} />
      </div>

      {/* Categories */}
      {categories.length > 0 && (
        <div className="rounded-xl border border-gray-200 bg-white shadow-sm overflow-hidden">
          <div className="px-4 py-3 border-b border-gray-100">
            <h3 className="text-sm font-bold text-gray-800">By category</h3>
            <p className="text-xs text-gray-500 mt-0.5">Issue rollup by product module.</p>
          </div>
          <div className="px-4 py-4 space-y-2">
            {(() => {
              const max = Math.max(1, ...categories.map((c) => c.instances));
              return categories.map((c, idx) => (
                <div key={c.module} className="flex items-center gap-3">
                  <span className="w-28 shrink-0 text-sm font-medium text-gray-700 capitalize">{c.module}</span>
                  <div className="flex-1 h-6 bg-gray-100 rounded overflow-hidden">
                    <div
                      className="h-full rounded flex items-center px-2 text-xs font-semibold text-white"
                      style={{ width: `${(c.instances / max) * 100}%`, background: PALETTE[idx % PALETTE.length] }}
                    >
                      {c.instances}
                    </div>
                  </div>
                  <span className="w-44 shrink-0 text-right text-xs text-gray-500">
                    {c.customersAffected} customers · {c.signalsAffected} issue{c.signalsAffected !== 1 ? 's' : ''}
                  </span>
                </div>
              ));
            })()}
          </div>
        </div>
      )}
    </div>
  );
}

    finally { setLoading(false); }

              <SortHeader label="Sites" k="sites" align="right" {...sf} />
              <SortHeader label="Subscribed issues" k="signalsSubscribed" align="right" {...sf} />
              <SortHeader label="Active issues" k="issuesFiring" align="right" {...sf} />
              <SortHeader label="Critical" k="critical" align="right" {...sf} />
              <SortHeader label="Last updated" k="lastUpdated" align="right" {...sf} />
            </tr>
          </thead>
          <tbody>
            {sf.rows.map((c) => (
              <tr
                key={c.tenantCode}
                onClick={() => onSelectCustomer(c.tenantCode)}
                className="border-t border-gray-100 hover:bg-blue-50/40 cursor-pointer"
              >
                <td className="px-4 py-2 font-medium text-gray-800">{c.tenantCode}</td>
                <td className="px-3 py-2 text-right tabular-nums text-gray-500">{c.sites}</td>

                    : <span className="text-gray-300">0</span>}
                </td>
                <td className="px-3 py-2 text-right tabular-nums">
                  {c.critical > 0 ? <span className="font-bold text-red-600">{c.critical}</span> : <span className="text-gray-300">0</span>}

                <td className="px-3 py-2 text-right"><RelTime iso={c.lastUpdated} /></td>
              </tr>
            ))}

              <tr><td colSpan="6" className="px-4 py-8 text-center text-sm text-gray-400">No customers match</td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function SubscriptionsList({ byIssue, onSelectCustomer }) {
  const [q, setQ] = useState('');
  const [signal, setSignal] = useState('');
  const [active, setActive] = useState(''); // '', 'true', 'false'
  const [skip, setSkip] = useState(0);
  const [limit] = useState(100);
  const [data, setData] = useState([]);
  const [total, setTotal] = useState(0);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const debounceRef = useRef(null);
  const load = useCallback(() => {
    setLoading(true); setError(null);
    const params = new URLSearchParams({ limit: String(limit), skip: String(skip) });
    if (q.trim()) params.set('q', q.trim());
    if (signal) params.set('signal', signal);
    if (active) params.set('active', active);
    apiFetch(`/api/subscriptions/list?${params}`)
      .then((r) => { setData(r.data); setTotal(r.total); })
      .catch((e) => setError(e.message))
      .finally(() => setLoading(false));
  }, [q, signal, active, skip, limit]);

  useEffect(() => {
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(load, 200);
    return () => { if (debounceRef.current) clearTimeout(debounceRef.current); };
  }, [load]);

  const onFilterChange = (setter) => (e) => { setSkip(0); setter(e.target.value); };

  const sf = useSortFilter(data, { defaultKey: 'tenantCode', defaultDir: 'asc' });

  const page = Math.floor(skip / limit) + 1;
  const lastPage = Math.max(1, Math.ceil(total / limit));

  return (
    <div className="space-y-3">
      <div className="flex flex-wrap items-center gap-2">
        <input
          type="text" value={q} onChange={onFilterChange(setQ)} placeholder="Search customer, site, fingerprint…"
          className="flex-1 min-w-[220px] max-w-md rounded border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500"
        />
        <select value={signal} onChange={onFilterChange(setSignal)}
          className="rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:border-blue-500">
          <option value="">All issues</option>
          {byIssue.map((i) => (<option key={i.signalId} value={i.signalId}>{i.name}</option>))}
        </select>
        <select value={active} onChange={onFilterChange(setActive)}
          className="rounded border border-gray-300 px-2 py-1.5 text-sm focus:outline-none focus:border-blue-500">
          <option value="">Active + inactive</option>
          <option value="true">Active only</option>
          <option value="false">Inactive only</option>
        </select>
        <span className="ml-auto text-xs text-gray-500">{total.toLocaleString('en-IN')} match{total !== 1 ? 'es' : ''}</span>
      </div>

      {error && <ErrorBox msg={error} />}

      <div className="rounded-xl border border-gray-200 bg-white shadow-sm overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-gray-50">
              <tr>
                <SortHeader label="Customer" k="tenantCode" {...sf} />
                <SortHeader label="Site" k="facilityCode" {...sf} />
                <SortHeader label="Issue" k="signalName" {...sf} />
                <SortHeader label="Status" k="isSubscribed" {...sf} />
                <SortHeader label="Schedule" k="signalModule" {...sf} />
                <SortHeader label="Updated" k="updatedAt" {...sf} />
              </tr>
            </thead>
            <tbody>
              {loading && (
                <tr><td colSpan="6" className="px-3 py-6 text-center"><Spinner /></td></tr>
              )}
              {!loading && sf.rows.map((r) => (
                <tr key={r._id} className="border-t border-gray-100">
                  <td className="px-3 py-1.5">
                    <button className="font-medium text-blue-700 hover:underline" onClick={() => onSelectCustomer(r.tenantCode)}>{r.tenantCode}</button>
                  </td>
                  <td className="px-3 py-1.5 font-mono text-xs text-gray-700">{r.facilityCode || '—'}</td>
                  <td className="px-3 py-1.5">
                    <p className="text-xs text-gray-800 leading-tight">{r.signalName || r.signalId}</p>
                    {r.signalModule && <p className="text-[10px] text-gray-400 uppercase tracking-wide">{r.signalModule}</p>}
                  </td>
                  <td className="px-3 py-1.5">
                    {r.isSubscribed
                      ? <span className="text-xs font-semibold px-2 py-0.5 rounded bg-green-100 text-green-700">Active</span>
                      : <span className="text-xs font-semibold px-2 py-0.5 rounded bg-gray-100 text-gray-600">Inactive</span>}
                  </td>
                  <td className="px-3 py-1.5 text-xs text-gray-600">
                    {r.config?.interval || '—'}{r.config?.timezone ? ` · ${r.config.timezone}` : ''}
                  </td>
                  <td className="px-3 py-1.5 text-xs text-gray-500">{fmtTime(r.updatedAt)}</td>
                </tr>
              ))}
              {!loading && sf.rows.length === 0 && (
                <tr><td colSpan="6" className="px-3 py-6 text-center text-sm text-gray-400">No subscriptions match</td></tr>
              )}
            </tbody>
          </table>
        </div>
        <div className="flex items-center justify-between px-3 py-2 border-t border-gray-100 bg-gray-50 text-xs text-gray-600">
          <span>Page {page} / {lastPage}</span>
          <div className="flex gap-2">
            <button onClick={() => setSkip(Math.max(0, skip - limit))} disabled={skip === 0}
              className="px-2 py-1 rounded border border-gray-300 disabled:opacity-40 hover:bg-white">Prev</button>
            <button onClick={() => setSkip(skip + limit)} disabled={skip + limit >= total}
              className="px-2 py-1 rounded border border-gray-300 disabled:opacity-40 hover:bg-white">Next</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function SubscriptionsMatrix({ onSelectCustomer, onSelectIssue }) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [q, setQ] = useState('');

  useEffect(() => {
    let cancelled = false;
    apiFetch('/api/subscriptions/matrix')
      .then((r) => { if (!cancelled) setData(r.data); })
      .catch((e) => { if (!cancelled) setError(e.message); })
      .finally(() => { if (!cancelled) setLoading(false); });
    return () => { cancelled = true; };
  }, []);

  if (loading) return <Spinner />;
  if (error) return <ErrorBox msg={error} />;
  if (!data) return null;

  const filtered = q.trim()
    ? data.customers.filter((c) => c.tenantCode.toLowerCase().includes(q.trim().toLowerCase()))
    : data.customers;

  const max = Math.max(1, ...filtered.flatMap((c) => Object.values(c.totals)));
  const cellBg = (n) => n === 0 ? '#f8fafc' : `rgba(37,99,235,${0.15 + (n / max) * 0.75})`;

  return (
    <div className="space-y-3">
      <div className="flex items-center gap-3">
        <input
          type="text" value={q} onChange={(e) => setQ(e.target.value)} placeholder="Filter customers…"
          className="flex-1 max-w-sm rounded border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500"
        />
        <span className="ml-auto text-xs text-gray-500">{filtered.length} customers · {data.issues.length} issues</span>
      </div>

      <div className="rounded-xl border border-gray-200 bg-white shadow-sm overflow-x-auto">
        <table className="text-xs border-collapse" style={{ minWidth: 200 + data.issues.length * 90 }}>
          <thead>
            <tr>
              <th className="sticky left-0 bg-white text-left px-3 py-2 text-[11px] uppercase tracking-wide text-gray-500 font-semibold border-b border-gray-200" style={{ minWidth: 180 }}>Customer</th>
              {data.issues.map((iss) => (
                <th key={iss.signalId} className="px-2 py-2 text-[11px] text-gray-600 font-semibold border-b border-gray-200 text-center"
                    style={{ minWidth: 88, maxWidth: 88 }}>
                  <button
                    onClick={() => onSelectIssue && onSelectIssue({
                      _id: iss.signalId, name: iss.name, module: iss.module,
                      signalCode: iss.signalCode, description: '',
                      severityCounts: { CRITICAL: 0, WARNING: 0, LOW: 0 },
                    })}
                    className="text-left hover:underline w-full break-words leading-tight"
                    title={iss.name}
                  >
                    {iss.name}
                  </button>
                </th>
              ))}
              <th className="text-right px-3 py-2 text-[11px] uppercase tracking-wide text-gray-500 font-semibold border-b border-gray-200">Total</th>
            </tr>
          </thead>
          <tbody>
            {filtered.slice(0, 200).map((c) => (
              <tr key={c.tenantCode} className="hover:bg-blue-50/30">
                <td className="sticky left-0 bg-white px-3 py-1.5 font-medium text-gray-800 border-t border-gray-100">
                  <button onClick={() => onSelectCustomer(c.tenantCode)} className="text-blue-700 hover:underline">{c.tenantCode}</button>
                </td>
                {data.issues.map((iss) => {
                  const n = c.totals[iss.signalId] || 0;
                  return (
                    <td key={iss.signalId} className="text-center border-t border-gray-100 p-0.5">
                      <div className="rounded font-semibold mx-auto flex items-center justify-center"
                           style={{ width: 70, height: 24, background: cellBg(n), color: n > 0 ? '#1e3a8a' : '#cbd5e1', fontSize: 11 }}
                           title={`${c.tenantCode} · ${iss.name}: ${n} subscription${n !== 1 ? 's' : ''}`}>
                        {n || ''}
                      </div>
                    </td>
                  );
                })}
                <td className="text-right tabular-nums px-3 py-1.5 font-semibold text-gray-800 border-t border-gray-100">{c.total.toLocaleString('en-IN')}</td>
              </tr>
            ))}
          </tbody>
        </table>
        {filtered.length > 200 && (
          <p className="text-xs text-gray-400 px-3 py-2 border-t border-gray-100">Showing first 200 of {filtered.length} — use the filter to narrow.</p>
        )}
      </div>
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// 9. App root — tab router, URL sync, drilldown resolution
// ═════════════════════════════════════════════════════════════════════════════

const TABS = [
  { key: 'impact',        label: 'Impact' },
  { key: 'customers',     label: 'Customers' },
  { key: 'issues',        label: 'Issues' },
  { key: 'subscriptions', label: 'Subscriptions' },
];

function App() {
  // Initialize directly from URL so refresh / direct links land on the right view.
  const initial = useMemo(() => parseHash(), []);
  const [tab, setTab] = useState(initial.tab);
  const [selectedIssueId, setSelectedIssueId] = useState(initial.tab === 'issues' ? initial.detail : null);
  const [selectedCustomer, setSelectedCustomer] = useState(initial.tab === 'customers' ? initial.detail : null);
  const [subView, setSubView] = useState(
    initial.tab === 'subscriptions' && VALID_SUB_VIEWS.includes(initial.detail) ? initial.detail : 'overview'
  );
  const [selectedIssue, setSelectedIssue] = useState(null); // resolved signal object

  // When we have a signalId from URL but not the full signal metadata, resolve it
  // by hitting /api/signals once and finding by _id.
  useEffect(() => {
    if (!selectedIssueId) { setSelectedIssue(null); return; }
    if (selectedIssue && selectedIssue._id === selectedIssueId) return;
    let cancelled = false;
    apiFetch('/api/signals')
      .then((r) => {
        if (cancelled) return;
        const sig = (r.data || []).find((s) => s._id === selectedIssueId);
        if (sig) setSelectedIssue(sig);
      })
      .catch(() => { /* leave selectedIssue unset; SignalDetailScreen guards */ });
    return () => { cancelled = true; };
  }, [selectedIssueId, selectedIssue]);

  // Push the current state to the URL on every change.
  useEffect(() => {
    let detail = null;
    if (tab === 'customers') detail = selectedCustomer;
    else if (tab === 'issues') detail = selectedIssueId;
    else if (tab === 'subscriptions' && subView !== 'overview') detail = subView;
    const next = buildHash(tab, detail);
    if (window.location.hash !== next) {
      window.history.pushState(null, '', next);
    }
  }, [tab, selectedCustomer, selectedIssueId, subView]);

  // React to browser back/forward and external hash changes.
  useEffect(() => {
    const onHash = () => {
      const p = parseHash();
      setTab(p.tab);
      setSelectedIssueId(p.tab === 'issues' ? p.detail : null);
      setSelectedCustomer(p.tab === 'customers' ? p.detail : null);
      setSubView(
        p.tab === 'subscriptions' && VALID_SUB_VIEWS.includes(p.detail) ? p.detail : 'overview'
      );
    };
    window.addEventListener('hashchange', onHash);
    window.addEventListener('popstate', onHash);
    return () => {
      window.removeEventListener('hashchange', onHash);
      window.removeEventListener('popstate', onHash);
    };
  }, []);

  const goToIssue = useCallback((sig) => {
    setSelectedCustomer(null);
    setSelectedIssue(sig);
    setSelectedIssueId(sig?._id || null);
    setTab('issues');
  }, []);
  const goToCustomer = useCallback((tc) => {
    setSelectedIssue(null);
    setSelectedIssueId(null);
    setSelectedCustomer(tc);
    setTab('customers');
  }, []);

  // Clicking a tab resets drilldowns / sub-views so each tab opens at its root.
  const onTabClick = useCallback((k) => {
    setTab(k);
    setSelectedIssue(null);
    setSelectedIssueId(null);
    setSelectedCustomer(null);
    setSubView('overview');
  }, []);

  return (
    <div className="min-h-screen bg-gray-50">
      <header className="border-b border-gray-200 bg-white">
        <div className="max-w-7xl mx-auto px-6 py-3 flex items-center gap-6">
          <span className="font-bold text-lg text-gray-900">Signals Impact</span>
          <nav className="flex items-center gap-1 ml-2">
            {TABS.map((t) => (
              <button
                key={t.key}
                onClick={() => onTabClick(t.key)}
                className={`px-3 py-1.5 rounded-md text-sm font-semibold transition-colors ${
                  tab === t.key ? 'bg-gray-900 text-white' : 'text-gray-600 hover:bg-gray-100'
                }`}
              >
                {t.label}
              </button>
            ))}
          </nav>
          {((tab === 'issues' && selectedIssueId) || (tab === 'customers' && selectedCustomer)) && (
            <div className="flex items-center gap-2 text-sm text-gray-500 ml-2 truncate">
              <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="#9ca3af" strokeWidth="2">
                <path d="M4 2l5 5-5 5" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
              <span className="truncate max-w-xs">
                {tab === 'issues' ? (selectedIssue?.name || selectedIssueId) : selectedCustomer}
              </span>
            </div>
          )}
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-6 py-6">
        {tab === 'impact' && (
          <>
            <div className="mb-5">
              <h1 className="text-2xl font-bold text-gray-900">Impact</h1>
              <p className="text-sm text-gray-500 mt-1">What's the current impact across our customers?</p>
            </div>
            <ImpactDashboard onSelectIssue={goToIssue} onSelectCustomer={goToCustomer} />
          </>
        )}

        {tab === 'customers' && !selectedCustomer && (
          <>
            <div className="mb-5">
              <h1 className="text-2xl font-bold text-gray-900">Customers</h1>
              <p className="text-sm text-gray-500 mt-1">All customers and their current issue load.</p>
            </div>
            <CustomersScreen onSelectCustomer={setSelectedCustomer} />
          </>
        )}

        {tab === 'customers' && selectedCustomer && (
          <CustomerDetailScreen
            tenantCode={selectedCustomer}
            onBack={() => setSelectedCustomer(null)}
            onSelectIssue={goToIssue}
          />
        )}

        {tab === 'issues' && !selectedIssueId && (
          <>
            <div className="mb-5">
              <h1 className="text-2xl font-bold text-gray-900">Issues</h1>
              <p className="text-sm text-gray-500 mt-1">Browse all signals and drill into any issue.</p>
            </div>
            <SignalListScreen onSelectSignal={(sig) => goToIssue(sig)} />
          </>
        )}

        {tab === 'issues' && selectedIssueId && !selectedIssue && (
          <Spinner />
        )}

        {tab === 'issues' && selectedIssueId && selectedIssue && (
          <SignalDetailScreen
            signal={selectedIssue}
            onBack={() => { setSelectedIssue(null); setSelectedIssueId(null); }}
            onSelectCustomer={goToCustomer}
          />
        )}

        {tab === 'subscriptions' && (
          <>
            <div className="mb-5">
              <h1 className="text-2xl font-bold text-gray-900">Subscriptions</h1>
              <p className="text-sm text-gray-500 mt-1">Coverage of issues across customers and sites.</p>
            </div>
            <SubscriptionsScreen
              onSelectCustomer={goToCustomer}
              onSelectIssue={goToIssue}
              view={subView}
              onViewChange={setSubView}
            />
          </>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
